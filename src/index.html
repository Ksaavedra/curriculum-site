<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        try {
          var k = 'cv-theme-preference';
          var v = localStorage.getItem(k);
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var effective = 'light';
          if (v === 'dark') effective = 'dark';
          else if (v === 'light') effective = 'light';
          else effective = prefersDark ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', effective);
        } catch (e) {}
      })();
    </script>
    <title>Currículo</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
