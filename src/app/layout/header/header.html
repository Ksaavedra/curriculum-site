<header class="header">
  <a routerLink="/" class="brand">Currículo</a>
  <nav class="nav" aria-label="Principal">
    @for (link of links; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: link.exact }"
        >{{ link.label }}</a
      >
    }
  </nav>
</header>
