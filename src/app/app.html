<mat-sidenav-container class="app-root-drawer">
  <mat-sidenav
    #navDrawer="matSidenav"
    id="mobile-nav-panel"
    class="mobile-nav-drawer"
    mode="over"
    position="start"
    [fixedInViewport]="true"
    [autoFocus]="false"
    (openedChange)="onMobileDrawerOpened($event)"
  >
    <nav class="mobile-sidenav-nav" aria-label="Principal">
      <mat-nav-list>
        @for (link of navLinks; track link.path) {
          <a
            mat-list-item
            [routerLink]="link.path"
            routerLinkActive="mobile-nav-active"
            [routerLinkActiveOptions]="{ exact: link.exact }"
            (click)="navDrawer.close()"
          >
            <app-cv-icon [name]="link.icon" />
            <span class="mobile-nav-label">{{ link.label }}</span>
          </a>
        }
      </mat-nav-list>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="app-sidenav-content">
    <div class="shell">
      <app-header
        [drawerOpened]="mobileDrawerOpen()"
        (toggleMobileNav)="navDrawer.toggle()"
      />
      <main class="main">
        <div class="container">
          <router-outlet />
        </div>
      </main>
      <footer class="footer">
        <div class="container">
          <small>&copy; {{ year }} · Currículo online</small>
        </div>
      </footer>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
