<mat-sidenav-container class="app-root-drawer">
  <a href="#conteudo-principal" class="cv-skip-link">Saltar para o conteúdo</a>
  <mat-sidenav
    #navDrawer="matSidenav"
    id="mobile-nav-panel"
    class="mobile-nav-drawer"
    mode="over"
    position="start"
    aria-label="Navegação em menu lateral para ecrãs pequenos"
    [fixedInViewport]="true"
    [autoFocus]="false"
    (openedChange)="onMobileDrawerOpened($event)"
  >
    <nav class="mobile-sidenav-nav" aria-label="Principal">
      <mat-nav-list>
        @for (link of navLinks; track link.path) {
          <a
            mat-list-item
            [routerLink]="link.path"
            routerLinkActive="mobile-nav-active"
            [routerLinkActiveOptions]="{ exact: link.exact }"
            (click)="navDrawer.close()"
          >
            <app-cv-icon [name]="link.icon" />
            <span class="mobile-nav-label">{{ link.label }}</span>
          </a>
        }
      </mat-nav-list>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="app-sidenav-content">
    <div class="shell">
      <app-header
        [drawerOpened]="mobileDrawerOpen()"
        (toggleMobileNav)="onMobileNavToggle()"
      />
      <main id="conteudo-principal" class="main" tabindex="-1" aria-label="Conteúdo principal">
        <div class="container">
          <router-outlet />
        </div>
      </main>
      <footer class="footer" aria-label="Rodapé">
        <div class="container">
          <small>&copy; {{ year }} · Currículo online</small>
        </div>
      </footer>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
