<section class="page">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
      <div class="cv-section">
        <h1>Contato</h1>
        <p class="lead">Envie uma mensagem — retorno o quanto antes possível.</p>
      </div>

      <div class="cv-section">
        @if (success()) {
          <p class="banner ok" role="status">Mensagem enviada com sucesso.</p>
        }

        @if (errorMsg(); as err) {
          <p class="banner err" role="alert">{{ err }}</p>
        }

        <form [formGroup]="form" (ngSubmit)="submit()" class="contact-form" novalidate>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Nome</mat-label>
          <input matInput id="contact-name" formControlName="name" autocomplete="name" />
          <mat-error>{{ fieldError('name') }}</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>E-mail</mat-label>
          <input
            matInput
            id="contact-email"
            type="email"
            formControlName="email"
            autocomplete="email"
          />
          <mat-error>{{ fieldError('email') }}</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Mensagem</mat-label>
          <textarea matInput id="contact-message" formControlName="message" rows="6"></textarea>
          <mat-error>{{ fieldError('message') }}</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="submitting()">
          {{ submitting() ? 'Enviando…' : 'Enviar' }}
        </button>
        </form>
      </div>
    </div>
  </div>
</section>
