<div class="home">
  <section class="hero" aria-labelledby="home-title">
    <p class="eyebrow">Olá, sou</p>
    <h1 id="home-title">{{ profile.name }}</h1>
    <p class="headline">{{ profile.headline }}</p>
    <p class="summary">{{ profile.summary }}</p>
    <div class="actions">
      <a routerLink="/contato" class="btn primary">Entrar em contato</a>
      <a routerLink="/experiencia" class="btn ghost">Ver experiência</a>
    </div>
  </section>

  @if (highlights.length) {
    <section class="highlights" aria-label="Destaques">
      @for (h of highlights; track h.label) {
        <article class="metric">
          <p class="value">{{ h.value }}</p>
          <p class="label">{{ h.label }}</p>
        </article>
      }
    </section>
  }
</div>
