<section class="page" aria-labelledby="page-heading">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-11 col-xl-10 cv-page-col">
      <div class="cv-section">
        <h1 id="page-heading">Sobre</h1>
        <div class="about-summary">
          @for (para of summaryParagraphs; track $index) {
          <p class="about-summary__para" [class.lead]="$first">{{ para }}</p>
          }
        </div>
      </div>
    </div>
  </div>
</section>
