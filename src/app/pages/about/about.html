<section class="page">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-11 col-xl-10">
      <div class="cv-section">
        <h1>Sobre</h1>
        <p class="lead">{{ profile.summary }}</p>
      </div>
      <div class="cv-section">
        <dl class="meta row row-cols-1 row-cols-sm-2 g-4">
        <div class="col">
          <dt>Local</dt>
          <dd>{{ profile.location }}</dd>
        </div>
        <div class="col">
          <dt>E-mail</dt>
          <dd>
            <a [href]="'mailto:' + profile.email">{{ profile.email }}</a>
          </dd>
        </div>
        <div class="col">
          <dt>Telefone</dt>
          <dd>{{ profile.phone }}</dd>
        </div>
        @if (profile.linkedin) {
          <div class="col">
            <dt>LinkedIn</dt>
            <dd>
              <a [href]="profile.linkedin" target="_blank" rel="noopener noreferrer">Abrir perfil</a>
            </dd>
          </div>
        }
        @if (profile.github) {
          <div class="col">
            <dt>GitHub</dt>
            <dd>
              <a [href]="profile.github" target="_blank" rel="noopener noreferrer">Ver no GitHub</a>
            </dd>
          </div>
        }
        </dl>
      </div>
    </div>
  </div>
</section>
