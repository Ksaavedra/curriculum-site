<section class="page">
  <h1>Projetos</h1>
  <p class="lead">Seleção de trabalhos e experimentos técnicos.</p>
  <div class="grid">
    @for (p of cv.content.projects; track p.name) {
      <article class="card">
        <h2>{{ p.name }}</h2>
        <p class="desc">{{ p.description }}</p>
        <ul class="tech">
          @for (t of p.tech; track t) {
            <li>{{ t }}</li>
          }
        </ul>
        @if (p.link) {
          <a class="link" [href]="p.link" target="_blank" rel="noopener noreferrer">Ver projeto</a>
        }
      </article>
    }
  </div>
</section>
