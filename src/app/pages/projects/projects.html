<section class="page">
  <div class="row">
    <div class="col-12">
      <h1>Projetos</h1>
      <p class="lead">Seleção de trabalhos e experimentos técnicos.</p>
    </div>
  </div>
  <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
    @for (p of cv.content.projects; track p.name) {
      <div class="col d-flex">
        <article class="card h-100 w-100">
          <h2>{{ p.name }}</h2>
          <p class="desc">{{ p.description }}</p>
          <ul class="tech">
            @for (t of p.tech; track t) {
              <li>{{ t }}</li>
            }
          </ul>
          @if (p.link) {
            <a class="link mt-auto" [href]="p.link" target="_blank" rel="noopener noreferrer">
              <app-cv-icon name="external" />
              Ver projeto
            </a>
          }
        </article>
      </div>
    }
  </div>
</section>
