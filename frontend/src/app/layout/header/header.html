<header class="header">
  @if (isMdUp()) {
  <nav class="navbar navbar-expand-md header-navbar" aria-label="Principal">
    <div class="container-fluid header-navbar-inner">
      <ul class="navbar-nav ms-md-auto header-nav-list">
        @for (link of links; track link.path) {
        <li class="nav-item">
          <a class="nav-link header-nav-link" [routerLink]="link.path" routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: link.exact }">
            <app-cv-icon [name]="link.icon" />
            {{ link.label }}
          </a>
        </li>
        }
      </ul>

      <div class="d-flex align-items-center gap-2 ms-md-3 flex-shrink-0">
        <button type="button" mat-icon-button class="theme-toggle-btn" (click)="theme.cycle()"
          [attr.aria-label]="theme.ariaLabel()" [attr.title]="theme.buttonLabel()">
          <mat-icon aria-hidden="true">{{ theme.toggleIcon() }}</mat-icon>
        </button>
      </div>
    </div>
  </nav>
  } @else {
  <mat-toolbar class="header-mobile-toolbar">
    <button type="button" mat-icon-button (click)="onToggleMobileMenu()" [attr.aria-expanded]="drawerOpened()"
      aria-controls="mobile-nav-panel" aria-label="Abrir ou fechar menu de navegação">
      <mat-icon aria-hidden="true">menu</mat-icon>
    </button>
    <a routerLink="/" class="brand toolbar-brand" aria-label="Currículo — página inicial"></a>
    <span class="toolbar-spacer"></span>
    <button type="button" mat-icon-button class="theme-toggle-btn" (click)="theme.cycle()"
      [attr.aria-label]="theme.ariaLabel()" [attr.title]="theme.buttonLabel()">
      <mat-icon aria-hidden="true">{{ theme.toggleIcon() }}</mat-icon>
    </button>
  </mat-toolbar>
  }
</header>
